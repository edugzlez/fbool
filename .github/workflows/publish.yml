name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  # ── crates.io ──────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish fbool to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write # trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish -p fbool
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # ── PyPI wheels ────────────────────────────────────────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.os }}, Python ${{ matrix.python-version }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: fbool-py
          args: --release --out dist
          manylinux: auto # builds manylinux wheels on Linux (compatible with most distros)

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: fbool-py/dist

  # ── macOS ARM (Apple Silicon) ──────────────────────────────────────────────
  build-wheels-macos-arm:
    name: Build wheels (macos arm64, Python ${{ matrix.python-version }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: fbool-py
          target: aarch64-apple-darwin
          args: --release --out dist
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: fbool-py/dist

  # ── Linux ARM ──────────────────────────────────────────────────────────────
  build-wheels-linux-arm:
    name: Build wheels (linux aarch64, Python ${{ matrix.python-version }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: fbool-py
          target: aarch64-unknown-linux-gnu
          args: --release --out dist
          manylinux: auto
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-arm64
          path: fbool-py/dist

  # ── Publish to PyPI ────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-wheels-macos-arm, build-wheels-linux-arm]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fbool
    permissions:
      id-token: write # trusted publishing — no token needed
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
