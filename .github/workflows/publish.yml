name: Publish

on:
  push:
    tags:
      - 'rust-v*'   # e.g. rust-v0.1.0  →  publishes fbool to crates.io
      - 'py-v*'     # e.g. py-v0.1.0    →  builds wheels and publishes to PyPI

jobs:
  # ── crates.io ──────────────────────────────────────────────────────────────
  publish-crates:
    name: Publish fbool to crates.io
    if: startsWith(github.ref, 'refs/tags/rust-v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish fbool
        run: cargo publish -p fbool

  # ── PyPI wheels ────────────────────────────────────────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/py-v')
    needs: []
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: fbool-py
          args: --release --out dist
          manylinux: auto   # builds manylinux wheels on Linux (compatible with most distros)

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: fbool-py/dist

  # ── macOS ARM (Apple Silicon) ──────────────────────────────────────────────
  build-wheels-macos-arm:
    name: Build wheels (macos arm64)
    if: startsWith(github.ref, 'refs/tags/py-v')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: fbool-py
          target: aarch64-apple-darwin
          args: --release --out dist
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: fbool-py/dist

  # ── Linux ARM ──────────────────────────────────────────────────────────────
  build-wheels-linux-arm:
    name: Build wheels (linux aarch64)
    if: startsWith(github.ref, 'refs/tags/py-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: fbool-py
          target: aarch64-unknown-linux-gnu
          args: --release --out dist
          manylinux: auto
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-arm64
          path: fbool-py/dist

  # ── Publish to PyPI ────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-wheels-macos-arm, build-wheels-linux-arm]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/fbool
    permissions:
      id-token: write   # trusted publishing — no token needed
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
